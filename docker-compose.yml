services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
      target: runner
    image: shift-manager:latest
    restart: unless-stopped
    env_file:
      - .env.docker
    environment:
      NODE_ENV: production
      PORT: 5000
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/shiftflow}
      SESSION_SECRET: ${SESSION_SECRET:-change-this-to-a-long-random-secret}
    ports:
      - "${APP_PORT:-5000}:5000"
    depends_on:
      db:
        condition: service_healthy

  # One-time service to initialize/update schema.
  # Run with: docker compose run --rm migrate
  migrate:
    build:
      context: .
      dockerfile: Dockerfile
      target: tools
    env_file:
      - .env.docker
    environment:
      DATABASE_URL: ${DATABASE_URL:-postgresql://postgres:postgres@db:5432/shiftflow}
    command: npm run db:push
    depends_on:
      db:
        condition: service_healthy
    profiles:
      - tools

  db:
    image: postgres:16-alpine
    restart: unless-stopped
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-shiftflow}
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "${DB_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $$POSTGRES_USER -d $$POSTGRES_DB"]
      interval: 5s
      timeout: 5s
      retries: 10

volumes:
  postgres_data:
